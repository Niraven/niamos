<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>niamOS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            display: flex;
        }
        .sidebar {
            width: 240px;
            background: #0a0a0a;
            border-right: 1px solid #1a1a1a;
            padding: 20px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 40px;
        }
        .logo-icon {
            width: 32px;
            height: 32px;
            background: #fff;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-weight: bold;
        }
        .nav-group {
            margin-bottom: 30px;
        }
        .nav-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #666;
            margin-bottom: 10px;
        }
        .nav-item {
            padding: 10px;
            cursor: pointer;
            border-radius: 6px;
            margin-bottom: 4px;
            font-size: 14px;
            color: #999;
        }
        .nav-item:hover, .nav-item.active {
            background: #1a1a1a;
            color: #fff;
        }
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .header {
            height: 60px;
            border-bottom: 1px solid #1a1a1a;
            display: flex;
            align-items: center;
            padding: 0 20px;
            justify-content: space-between;
        }
        .content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }
        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid #1a1a1a;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            background: #00ff66;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 10px #00ff66;
        }
        h1 { font-size: 24px; margin-bottom: 10px; }
        p { color: #666; line-height: 1.6; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">
            <div class="logo-icon">N</div>
            <span style="font-weight: bold;">niamOS</span>
        </div>
        <div class="nav-group">
            <div class="nav-label">Core</div>
            <div class="nav-item active">Home</div>
            <div class="nav-item">Chat</div>
            <div class="nav-item">Agents</div>
        </div>
        <div class="nav-group">
            <div class="nav-label">System</div>
            <div class="nav-item">Metrics</div>
            <div class="nav-item">Capture</div>
        </div>
    </div>
    <div class="main">
        <div class="header">
            <div>Dashboard</div>
            <div><span class="status-dot"></span>Online</div>
        </div>
        <div class="content">
            <h1>Welcome to niamOS</h1>
            <p>Your AI command center is running.</p>
            <div class="grid">
                <div class="card">
                    <h3>Status</h3>
                    <p>All systems operational</p>
                </div>
                <div class="card">
                    <h3>Agents</h3>
                    <p>6 agents available</p>
                </div>
                <div class="card">
                    <h3>Memory</h3>
                    <p>92 files indexed</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
