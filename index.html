<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>niamOS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');
        
        :root {
            --bg: #0a0a0a;
            --bg-secondary: #111111;
            --surface: #1a1a1a;
            --surface-2: #222222;
            --surface-3: #2a2a2a;
            --border: #333333;
            --text-1: #ffffff;
            --text-2: #d4d4d4;
            --text-3: #808080;
            --accent: #00ff66;
            --accent-dim: rgba(0, 255, 102, 0.1);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: var(--bg);
            color: var(--text-1);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
        }
        
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .font-display { font-family: 'Inter', sans-serif; }
        
        /* Glass morphism */
        .glass {
            background: rgba(26, 26, 26, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(51, 51, 51, 0.5);
        }
        
        .glass-card {
            background: rgba(17, 17, 17, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(51, 51, 51, 0.3);
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--border); }
        
        /* Animations */
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 5px rgba(0, 255, 102, 0.3); }
            50% { box-shadow: 0 0 15px rgba(0, 255, 102, 0.6); }
        }
        
        .status-glow {
            animation: pulse-glow 2s ease-in-out infinite;
        }
        
        /* Transitions */
        .transition-all { transition: all 0.2s ease; }
        
        /* Selection */
        ::selection {
            background: var(--accent-dim);
            color: var(--accent);
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // Icons component
        const Icon = ({ name, size = 20, className = "" }) => {
            const iconRef = useRef(null);
            
            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    iconRef.current.innerHTML = '';
                    const icon = window.lucide.createElement(window.lucide.icons[name]);
                    if (icon) {
                        icon.setAttribute('width', size);
                        icon.setAttribute('height', size);
                        iconRef.current.appendChild(icon);
                    }
                }
            }, [name, size]);
            
            return <span ref={iconRef} className={className}></span>;
        };
        
        // Sidebar Component
        const Sidebar = ({ activeTab, onTabChange }) => {
            const SidebarItem = ({ icon, label, active, onClick, badge }) => (
                <div 
                    onClick={onClick}
                    className={`
                        flex items-center gap-3 px-3 py-2.5 rounded-lg cursor-pointer
                        transition-all text-[13px] font-medium
                        ${active 
                            ? 'bg-white/10 text-white' 
                            : 'text-gray-400 hover:text-white hover:bg-white/5'
                        }
                    `}
                >
                    <Icon name={icon} size={18} />
                    <span className="flex-1">{label}</span>
                    {badge && (
                        <span className="text-[9px] font-bold uppercase tracking-wider px-1.5 py-0.5 bg-white/10 rounded text-gray-400">
                            {badge}
                        </span>
                    )}
                </div>
            );
            
            const SidebarGroup = ({ label, children }) => (
                <div className="mb-6">
                    <div className="text-[10px] font-bold uppercase tracking-[0.2em] text-gray-500 mb-2 px-3">
                        {label}
                    </div>
                    <div className="space-y-1">
                        {children}
                    </div>
                </div>
            );
            
            return (
                <aside className="w-[240px] h-full bg-[#0a0a0a] border-r border-[#1a1a1a] flex flex-col">
                    <div className="p-5">
                        {/* Logo */}
                        <div className="flex items-center gap-3 mb-10">
                            <div className="w-8 h-8 rounded-xl bg-white text-black flex items-center justify-center">
                                <Icon name="Shield" size={20} className="text-black" />
                            </div>
                            <span className="font-bold text-lg tracking-tight">niamOS</span>
                        </div>
                        
                        {/* Navigation */}
                        <div className="space-y-6">
                            <SidebarGroup label="Core">
                                <SidebarItem 
                                    icon="Home" 
                                    label="Home" 
                                    active={activeTab === 'home'}
                                    onClick={() => onTabChange('home')}
                                />
                                <SidebarItem 
                                    icon="Files" 
                                    label="Files" 
                                    active={activeTab === 'files'}
                                    onClick={() => onTabChange('files')}
                                />
                                <SidebarItem 
                                    icon="Cpu" 
                                    label="Chats" 
                                    active={activeTab === 'agents'}
                                    onClick={() => onTabChange('agents')}
                                />
                            </SidebarGroup>
                            
                            <SidebarGroup label="System">
                                <SidebarItem 
                                    icon="Terminal" 
                                    label="Terminal" 
                                    active={activeTab === 'metrics'}
                                    onClick={() => onTabChange('metrics')}
                                />
                                <SidebarItem 
                                    icon="Zap" 
                                    label="Capture" 
                                    active={activeTab === 'capture'}
                                    onClick={() => onTabChange('capture')}
                                />
                                <SidebarItem 
                                    icon="Layout" 
                                    label="Space" 
                                    badge="BETA"
                                />
                                <SidebarItem 
                                    icon="Layers" 
                                    label="Skills" 
                                />
                            </SidebarGroup>
                            
                            <SidebarGroup label="Infra">
                                <SidebarItem icon="Monitor" label="Computer" />
                                <SidebarItem icon="Globe" label="Hosting" />
                                <SidebarItem icon="Database" label="Datasets" badge="BETA" />
                            </SidebarGroup>
                        </div>
                    </div>
                    
                    {/* User Profile */}
                    <div className="mt-auto p-5 border-t border-[#1a1a1a]">
                        <div className="flex items-center gap-3 opacity-40 hover:opacity-100 transition-opacity cursor-pointer">
                            <div className="w-8 h-8 rounded-full bg-[#2a2a2a] flex items-center justify-center text-[10px] font-bold">
                                N
                            </div>
                            <div className="flex flex-col">
                                <span className="text-[11px] font-bold text-white leading-none mb-1">Nina Haven</span>
                                <span className="text-[9px] font-bold uppercase tracking-widest text-gray-500">Root Access</span>
                            </div>
                        </div>
                    </div>
                </aside>
            );
        };
        
        // Header Component
        const Header = ({ onSearch }) => {
            const StatusBubble = ({ color, label }) => (
                <div className="flex items-center gap-2">
                    <div className={`w-2 h-2 rounded-full ${color} status-glow`}></div>
                    <span className="text-[10px] font-mono font-bold uppercase tracking-[0.2em] text-gray-400">{label}</span>
                </div>
            );
            
            return (
                <header className="h-16 flex items-center justify-between px-6 glass border-b border-[#1a1a1a] z-30">
                    <div className="flex items-center gap-6">
                        <div className="flex items-center gap-2 text-[11px] font-mono font-bold tracking-tight text-gray-500">
                            <span className="hidden sm:inline">PROJECTS</span>
                            <Icon name="ChevronRight" size={10} />
                            <span className="hidden xs:inline text-white">NIAMOS_CORE</span>
                            <Icon name="ChevronRight" size={10} />
                            <span className="text-[#00ff66] underline underline-offset-4 decoration-[#00ff66]/30">DASHBOARD</span>
                        </div>
                    </div>
                    
                    <div className="hidden md:flex items-center gap-8">
                        <StatusBubble color="bg-green-500" label="ZO_CORE" />
                        <StatusBubble color="bg-green-500" label="HERMES" />
                        <span className="text-white tabular-nums text-xs font-medium">
                            {new Date().toLocaleTimeString('en-US', { hour12: false })}
                        </span>
                    </div>
                    
                    <div className="flex items-center gap-3">
                        <button 
                            onClick={onSearch}
                            className="p-2.5 glass-card rounded-full text-gray-400 hover:text-white transition-all hover:bg-[#222] active:scale-90"
                        >
                            <Icon name="Search" size={16} />
                        </button>
                        <div className="w-8 h-8 glass-card rounded-full flex items-center justify-center font-bold text-[10px] border border-[#00ff66]/20">
                            N
                        </div>
                    </div>
                </header>
            );
        };
        
        // Home Dashboard
        const HomeDashboard = () => {
            const MetricCard = ({ title, value, subtitle, trend }) => (
                <div className="glass-card rounded-xl p-5">
                    <div className="flex items-center justify-between mb-3">
                        <span className="text-[10px] font-mono font-bold uppercase tracking-[0.2em] text-gray-500">{title}</span>
                        {trend && (
                            <span className={`text-[10px] font-bold ${trend > 0 ? 'text-green-400' : 'text-red-400'}`}>
                                {trend > 0 ? '+' : ''}{trend}%
                            </span>
                        )}
                    </div>
                    <div className="text-2xl font-bold text-white mb-1">{value}</div>
                    <div className="text-[11px] text-gray-500">{subtitle}</div>
                </div>
            );
            
            const ProjectCard = ({ id, title, status, sprint, desc }) => (
                <div className="glass-card rounded-xl p-5 hover:bg-[#1a1a1a] transition-all cursor-pointer group">
                    <div className="flex items-start justify-between mb-3">
                        <div className="flex items-center gap-3">
                            <div className="w-8 h-8 bg-[#222] flex items-center justify-center border border-[#333] group-hover:border-[#00ff66]/40 transition-colors">
                                <span className="text-[10px] font-mono text-gray-400">#</span>
                            </div>
                            <div>
                                <h4 className="text-sm font-bold uppercase tracking-wider text-white">{title}</h4>
                                <p className="text-[10px] text-gray-500 font-medium">{desc}</p>
                            </div>
                        </div>
                        <span className="text-[9px] font-bold text-[#00ff66] uppercase tracking-widest">{status}</span>
                    </div>
                    <div className="flex items-center gap-2 text-[9px] text-gray-600 font-mono">
                        <span>SPRINT {sprint}</span>
                    </div>
                </div>
            );
            
            return (
                <div className="p-6 space-y-6">
                    {/* Greeting */}
                    <div>
                        <h1 className="text-2xl font-bold mb-1">Morning, Founder</h1>
                        <p className="text-sm text-gray-500">System operational. 3 agents active.</p>
                    </div>
                    
                    {/* Metrics */}
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                        <MetricCard title="System Load" value="42%" subtitle="Optimal range" trend={-5} />
                        <MetricCard title="Active Tasks" value="12" subtitle="4 pending review" trend={8} />
                        <MetricCard title="Memory Used" value="6.4GB" subtitle="Of 8GB allocated" trend={-2} />
                        <MetricCard title="API Latency" value="24ms" subtitle="Last 5 minutes" trend={-12} />
                    </div>
                    
                    {/* Projects */}
                    <div>
                        <div className="flex items-center justify-between mb-4">
                            <h2 className="text-sm font-bold uppercase tracking-wider">Active Projects</h2>
                            <button className="text-[10px] font-bold text-[#00ff66] uppercase tracking-[0.2em] hover:underline">
                                View All
                            </button>
                        </div>
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                            <ProjectCard 
                                id="1" 
                                title="HERMES_MIGRATION" 
                                status="IN_PROGRESS" 
                                sprint="4" 
                                desc="Migrate agents to Zo Computer" 
                            />
                            <ProjectCard 
                                id="2" 
                                title="NIAMOS_V1" 
                                status="ACTIVE" 
                                sprint="2" 
                                desc="Command center PWA development" 
                            />
                        </div>
                    </div>
                </div>
            );
        };
        
        // Chat Interface
        const ChatInterface = () => {
            const [messages, setMessages] = useState([
                { role: 'system', content: 'HERMES // NODE initialized. Ready for commands.' }
            ]);
            const [input, setInput] = useState('');
            
            const sendMessage = () => {
                if (!input.trim()) return;
                setMessages([...messages, { role: 'user', content: input }]);
                setInput('');
                // Simulate response
                setTimeout(() => {
                    setMessages(prev => [...prev, { 
                        role: 'assistant', 
                        content: 'Processing your request...' 
                    }]);
                }, 1000);
            };
            
            return (
                <div className="flex flex-col h-full">
                    <div className="flex-1 overflow-y-auto p-6 space-y-4">
                        {messages.map((msg, i) => (
                            <div key={i} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                <div className={`max-w-[80%] px-4 py-3 rounded-xl text-sm ${
                                    msg.role === 'user' 
                                        ? 'bg-white text-black' 
                                        : 'glass-card text-gray-200'
                                }`}>
                                    {msg.content}
                                </div>
                            </div>
                        ))}
                    </div>
                    <div className="p-4 border-t border-[#1a1a1a]">
                        <div className="flex items-center gap-3">
                            <input
                                type="text"
                                value={input}
                                onChange={(e) => setInput(e.target.value)}
                                onKeyPress={(e) => e.key === 'Enter' && sendMessage()}
                                placeholder="Type a command..."
                                className="flex-1 bg-[#1a1a1a] border border-[#333] rounded-lg px-4 py-3 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-[#00ff66]/50"
                            />
                            <button 
                                onClick={sendMessage}
                                className="p-3 bg-[#00ff66] text-black rounded-lg hover:bg-[#00ff66]/90 transition-all active:scale-95"
                            >
                                <Icon name="Send" size={18} />
                            </button>
                        </div>
                    </div>
                </div>
            );
        };
        
        // Main App
        const App = () => {
            const [activeTab, setActiveTab] = useState('home');
            const [searchOpen, setSearchOpen] = useState(false);
            
            const renderContent = () => {
                switch(activeTab) {
                    case 'home': return <HomeDashboard />;
                    case 'agents': return <ChatInterface />;
                    case 'files': return <div className="p-6 text-gray-500">File browser coming soon...</div>;
                    case 'metrics': return <div className="p-6 text-gray-500">Terminal coming soon...</div>;
                    case 'capture': return <div className="p-6 text-gray-500">Capture coming soon...</div>;
                    default: return <HomeDashboard />;
                }
            };
            
            return (
                <div className="flex h-screen bg-[#0a0a0a] text-white overflow-hidden">
                    <Sidebar activeTab={activeTab} onTabChange={setActiveTab} />
                    <div className="flex-1 flex flex-col min-w-0">
                        <Header onSearch={() => setSearchOpen(true)} />
                        <main className="flex-1 overflow-y-auto">
                            {renderContent()}
                        </main>
                    </div>
                    
                    {/* Search Overlay */}
                    {searchOpen && (
                        <div 
                            className="fixed inset-0 z-50 bg-black/90 backdrop-blur-md flex flex-col p-6 pt-24"
                            onClick={() => setSearchOpen(false)}
                        >
                            <div className="w-full max-w-2xl mx-auto">
                                <div className="glass-card flex items-center gap-4 px-6 py-4">
                                    <Icon name="Search" size={20} className="text-gray-500" />
                                    <input
                                        autoFocus
                                        type="text"
                                        placeholder="Search resources..."
                                        className="flex-1 bg-transparent text-xl outline-none placeholder-gray-600"
                                    />
                                    <span className="text-[10px] font-mono px-2 py-1 bg-[#2a2a2a] border border-[#333] rounded text-gray-500">ESC</span>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        
        // Mount
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
