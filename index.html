<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="niamOS - AI-powered operating system PWA with OpenClaw gateway integration" />
    <meta name="theme-color" content="#667eea" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Icons -->
    <link rel="apple-touch-icon" href="/openclaw-icon.png" />
    <link rel="icon" type="image/png" href="/openclaw-icon.png" />
    
    <title>niamOS - AI Operating System</title>
    
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      html, body {
        width: 100%;
        height: 100%;
      }
      
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: #333;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow: hidden;
      }
      
      #app {
        width: 100%;
        height: 100%;
      }
      
      /* Loading spinner while React mounts */
      .app-loading {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        color: white;
        font-size: 18px;
      }
      
      .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid rgba(255, 255, 255, 0.3);
        border-top: 4px solid white;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-right: 16px;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="app-loading">
        <div class="spinner"></div>
        <span>niamOS Initializing...</span>
      </div>
    </div>
    
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Fallback for browsers without JavaScript -->
    <noscript>
      <p style="text-align: center; color: white; margin-top: 50px;">
        niamOS requires JavaScript to be enabled. Please enable JavaScript in your browser.
      </p>
    </noscript>
  </body>
</html>
